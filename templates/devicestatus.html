<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard TRUE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body { background:#f8fafc; font-family:'Inter'; margin:0; }

.sidebar {
    width:220px;
    height:100vh;
    background:#fff;
    border-right:1px solid #e2e8f0;
    position:fixed;
    padding:20px;
}

.sidebar h4 { color:#2F4B8F; font-weight:700; }

.sidebar a {
    display:block;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    text-decoration:none;
    color:#334155;
}

.sidebar .active {
    background:#2F4B8F;
    color:white;
}

.main {
    margin-left:240px;
    padding:20px;
}

.navbar {
    background:white;
    border-bottom:3px solid #F5C400;
}

.title-glow {
    font-weight:700;
    color:#2F4B8F;
}

.subtitle {
    font-size:12px;
    color:#64748b;
}

.card {
    border-radius:14px;
    border:1px solid #e2e8f0;
}

.table thead {
    background:#F5C400;
}
</style>

<script>
// 🔥 AUTO REFRESH (SMART)
let autoRefresh;

function startAutoRefresh(){
    autoRefresh = setInterval(() => {
        location.reload();
    }, 10000);
}

function stopAutoRefresh(){
    clearInterval(autoRefresh);
}
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>Fatigue</h4>
    <a href="/">Home</a>
    <a href="/true" class="active">Dashboard TRUE</a>
    <a href="/devicestatus">Device Status</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- NAVBAR -->
<nav class="navbar shadow-sm mb-3 p-2">
    <div class="d-flex align-items-center gap-3">
        <img src="{{ url_for('static', filename='logo.png') }}" height="60">
        <div>
            <div class="title-glow">Fatigue Monitoring System</div>
            <div class="subtitle">Dashboard Monitoring</div>
        </div>
    </div>
</nav>
    
<div class="container">

<div class="title-glow mb-2">Dashboard TRUE</div>
<div class="subtitle mb-3">Realtime TRUE intervention monitoring</div>

<!-- FILTER -->
<div class="card p-3 mb-3">
<div class="d-flex flex-wrap gap-2">

<select id="site" class="form-select w-auto">
    <option value="brcg">BRCG</option>
    <option value="brcb">BRCB</option>
</select>

<!-- 🔥 FILTER UNIT -->
<input 
    type="text" 
    id="unit" 
    class="form-control w-auto" 
    placeholder="Filter Unit"
    onkeyup="filterUnit()"
    onfocus="stopAutoRefresh()"
>

<select id="jam" class="form-select w-auto">
    <option value="">Semua Jam</option>
    <option value="7">07</option>
    <option value="8">08</option>
    <option value="9">09</option>
    <option value="10">10</option>
    <option value="11">11</option>
</select>

<button class="btn btn-primary" onclick="applyFilter()">Filter</button>

</div>
</div>

<!-- TABLE -->
<div class="card p-3">

<table class="table text-center" id="tableData">
<thead>
<tr>
<th>PID</th>
<th>UNIT</th>
<th>ALERT</th>
<th>TIME</th>
<th>VIDEO</th>
</tr>
</thead>

<tbody>
{% for r in data %}
<tr>
<td><a href="{{ r[4] }}" target="_blank">{{ r[0] }}</a></td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td><a href="{{ r[4] }}" target="_blank" class="btn btn-success btn-sm">▶</a></td>
</tr>
{% endfor %}
</tbody>

</table>

</div>

</div>
</div>

<script>

// ==========================
// 🔥 BACKEND FILTER
// ==========================
function applyFilter(){
    const site=document.getElementById("site").value;
    const unit=document.getElementById("unit").value;
    const jam=document.getElementById("jam").value;

    localStorage.setItem("filterUnit", unit);

    window.location=`/true?site=${site}&unit=${unit}&jam=${jam}`;
}

// ==========================
// 🔥 REALTIME FILTER
// ==========================
function filterUnit() {
    const input = document.getElementById("unit").value.trim().toUpperCase();
    const rows = document.querySelectorAll("#tableData tbody tr");

    rows.forEach(row => {
        const unit = row.children[1].innerText.toUpperCase();

        if (unit.includes(input)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });

    localStorage.setItem("filterUnit", input);
}

// ==========================
// 🔥 LOAD STATE
// ==========================
window.onload = function(){

    startAutoRefresh();

    const saved = localStorage.getItem("filterUnit");

    if(saved){
        document.getElementById("unit").value = saved;
        filterUnit();
    }
};

</script>

</body>
</html>
