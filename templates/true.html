<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard TRUE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body {
    background: #f8fafc;
    font-family: 'Inter', sans-serif;
    margin: 0;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #ffffff;
    border-right: 1px solid #e2e8f0;
    position: fixed;
    padding: 20px;
}

.sidebar h4 {
    font-weight: 700;
    color: #2F4B8F;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    text-decoration: none;
    color: #334155;
}

.sidebar a:hover {
    background: #f1f5f9;
}

.sidebar .active {
    background: #2F4B8F;
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 20px;
}

/* NAVBAR */
.navbar {
    background: #ffffff;
    border-bottom: 3px solid #F5C400;
}

/* TITLE */
.title-glow {
    font-weight: 700;
    font-size: 20px;
    color: #2F4B8F;
}

.subtitle {
    color: #64748b;
    font-size: 12px;
}

/* CARD */
.card {
    background: #ffffff;
    border-radius: 14px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

/* TABLE */
.table thead {
    background: #F5C400;
}

.table tbody tr:hover {
    background: #f1f5f9;
}

/* BUTTON */
.btn-primary {
    background: #2F4B8F;
    border: none;
    border-radius: 10px;
}

.btn-primary:hover {
    background: #1E3A8A;
}

</style>

<script>
// AUTO REFRESH
setInterval(() => {
    location.reload();
}, 10000);
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>Fatigue</h4>
    <a href="/">Home</a>
    <a href="/true" class="active">Dashboard TRUE</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- NAVBAR -->
<nav class="navbar shadow-sm mb-3 p-2">
    <div class="d-flex align-items-center gap-3">

        <img src="{{ url_for('static', filename='logo.png') }}" height="45">

        <div>
            <div class="title-glow">Fatigue Monitoring System</div>
            <div class="subtitle">Dashboard Intervensi TRUE</div>
        </div>

    </div>
</nav>

<div class="container">

<div class="title-glow mb-2">Dashboard TRUE</div>
<div class="subtitle mb-3">Realtime TRUE intervention monitoring</div>

<!-- FILTER -->
<div class="card p-3 mb-3">

<div class="d-flex flex-wrap gap-2">

    <select id="site" class="form-select w-auto">
        <option value="brcg">BRCG</option>
        <option value="brcb">BRCB</option>
    </select>

    <input type="text" id="unit" class="form-control w-auto" placeholder="Filter Unit">

    <select id="jam" class="form-select w-auto">
        <option value="">Semua Jam</option>
        <option value="7">07</option>
        <option value="8">15</option>
        <option value="9">20</option>
        <option value="10">23</option>
    </select>

    <button class="btn btn-primary" onclick="applyFilter()">Filter</button>

</div>

</div>

<!-- TABLE -->
<div class="card p-3">

<div class="table-responsive">
<table class="table text-center align-middle">
    <thead>
        <tr>
            <th>PID</th>
            <th>UNIT</th>
            <th>ALERT</th>
            <th>TIME</th>
            <th>VIDEO</th>
        </tr>
    </thead>

    <tbody>
    {% for r in data %}
    <tr>

        <td>
            <a href="{{ r[4] }}" target="_blank" class="fw-bold text-decoration-none">
                {{ r[0] }}
            </a>
        </td>

        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ r[3] }}</td>

        <td>
            <a href="{{ r[4] }}" target="_blank" class="btn btn-sm btn-success">
                ▶ View
            </a>
        </td>

    </tr>
    {% endfor %}
    </tbody>
</table>
</div>

</div>

</div>
</div>

<script>

function applyFilter() {
    const site = document.getElementById("site").value;
    const unit = document.getElementById("unit").value;
    const jam = document.getElementById("jam").value;

    let url = `/true?site=${site}&unit=${unit}&jam=${jam}`;
    window.location.href = url;
}

</script>

</body>
</html>
